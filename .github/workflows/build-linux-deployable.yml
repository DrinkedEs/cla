name: Build Linux Deployable

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf deploy-bundle
          mkdir -p deploy-bundle

          mkdir -p deploy-bundle/.next

          for dir in public scripts database; do
            if [ -d "$dir" ]; then
              cp -R "$dir" "deploy-bundle/$dir"
            fi
          done

          if [ -d ".next/standalone" ]; then
            cp -R .next/standalone/. deploy-bundle/
          fi

          if [ -d ".next/static" ]; then
            cp -R .next/static deploy-bundle/.next/static
          fi

          for file in package.json package-lock.json .env.example README.md; do
            if [ -f "$file" ]; then
              cp "$file" "deploy-bundle/$file"
            fi
          done

          tar -C deploy-bundle -czf alwaysdata-deploy-linux.tar.gz .

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: alwaysdata-deploy-linux
          path: alwaysdata-deploy-linux.tar.gz
          if-no-files-found: error
